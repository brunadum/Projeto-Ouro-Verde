<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Ouro Verde</title>

    <link rel="stylesheet" href="../adminCSS/dashboard.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="logo-placeholder">
                LOGO
            </div>

            <nav>

                <a href="dashboard.html" class="active">
                    PEDIDOS
                </a>

                <a href="produtos.html">
                    PRODUTOS
                </a>

            </nav>

        </div>

        <div class="sidebar-bottom">

            <a href="#" id="logoutBtn">
                SAIR
            </a>

        </div>

    </aside>

    <!-- CONTEÚDO -->

    <main class="content">

        <h1>
            PAINEL<span>ADMIN</span>
        </h1>

        <!-- CARDS -->

        <section class="cards">

            <div class="card">
                <h3>RECEITA MENSAL</h3>
                <p id="receitaMensal"></p>
            </div>

            <div class="card">
                <h3>PRODUTOS ATIVOS</h3>
                <p id="produtosAtivos"></p>
            </div>

            <div class="card">
                <h3>PEDIDOS PENDENTES</h3>
                <p id="pedidosPendentes"></p>
            </div>

        </section>

        <!-- BOTÕES -->

        <div class="action-buttons">

            <button>
                PEDIDOS RECENTES
            </button>

            <button onclick="window.location.href='produtos.html'">
                GERENCIAR PRODUTOS
            </button>

        </div>

        <!-- TABELA -->

        <section class="table-container">

            <h3>PEDIDOS RECENTES:</h3>

            <table>

                <thead>
                    <tr>
                        <th>#</th>
                        <th>CLIENTE</th>
                        <th>PERÍODO</th>
                        <th>ENTREGA</th>
                        <th>TOTAL</th>
                        <th>STATUS</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>

                <tbody id="pedidosTable">

                    <!-- API -->

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- MODAL -->

<div class="modal" id="logoutModal">

    <div class="modal-content">

        <h2>Tem certeza que quer sair?</h2>

        <div class="modal-buttons">

            <button id="confirmLogout">
                SAIR
            </button>

            <button id="cancelLogout">
                CANCELAR
            </button>

        </div>

    </div>

</div>

<script src="../adminJS/dashboard.js"></script>

</body>
</html>
