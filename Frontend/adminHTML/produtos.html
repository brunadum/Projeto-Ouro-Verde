<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Ouro Verde</title>

    <link rel="icon" type="image/svg+xml" href="../adminAssets/logo.png">

    <link rel="stylesheet" href="../adminCSS/produtos.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-top">

            <div class="logo-placeholder">
                <img src="../adminAssets/logo.png" alt="">
            </div>

            <nav>

                <a href="dashboard.html">
                    PEDIDOS
                </a>

                <a href="produtos.html" class="active">
                    PRODUTOS
                </a>

            </nav>

        </div>

        <div class="sidebar-bottom">

            <a href="#" id="logoutBtn">
                SAIR
            </a>

        </div>

    </aside>

    <!-- CONTEÚDO -->

    <main class="content">

        <h1>
            PAINEL<span>ADMIN</span>
        </h1>

        <!-- CARDS -->

        <section class="cards">

            <div class="card">
                <h3>RECEITA MENSAL</h3>
            </div>

            <div class="card">
                <h3>PRODUTOS ATIVOS</h3>
            </div>

            <div class="card">
                <h3>PEDIDOS PENDENTES</h3>
            </div>

        </section>

        <!-- BOTÕES -->

        <div class="action-buttons">

            <button onclick="window.location.href='dashboard.html'">
                PEDIDOS RECENTES
            </button>

            <button onclick="window.location.href='produtos.html'">
                GERENCIAR PRODUTOS
            </button>

        </div>

        <!-- FORMULÁRIO -->

        <section class="form-container">

            <h3>+ ADICIONAR PRODUTO</h3>

            <form id="produtoForm">

                <div class="form-grid">

    <div class="form-group">
        <label>NOME DO PRODUTO *</label>
        <input type="text" id="nome">
    </div>

    <div class="form-group">
        <label>CATEGORIA *</label>
        <select id="categoria">
            <option value="">Carregando categorias...</option>
        </select>
    </div>

    <div class="form-group">
        <label>PREÇO POR DIA (R$)</label>
        <input type="number" id="preco">
    </div>

    <div class="form-group">
        <label>ESTOQUE *</label>
        <input type="number" id="estoque">
    </div>

    <div class="form-group image-field">
        <label>IMAGEM (URL)</label>
        <input
            type="text"
            id="imagem"
            placeholder="https://...">
    </div>

</div>

                <button type="submit" class="btn-add">
                    ADICIONAR
                </button>

            </form>

        </section>

        <!-- TABELA DE PRODUTOS -->

        <section class="table-container">

            <h3>PRODUTOS CADASTRADOS</h3>

            <table>

                <thead>
                    <tr>
                        <th>#</th>
                        <th>NOME</th>
                        <th>CATEGORIA</th>
                        <th>PREÇO</th>
                        <th>ESTOQUE</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>

                <tbody id="produtosTable">
                    <!-- API -->
                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- MODAL -->

<div class="modal" id="logoutModal">

    <div class="modal-content">

        <h2>Tem certeza que quer sair?</h2>

        <div class="modal-buttons">

            <button id="confirmLogout">
                SAIR
            </button>

            <button id="cancelLogout">
                CANCELAR
            </button>

        </div>

    </div>

</div>

<script src="../adminJS/api.js"></script>
<script src="../adminJS/produtos.js"></script>

</body>
</html>
