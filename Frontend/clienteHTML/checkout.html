<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Ouro Verde</title>

    <link rel="stylesheet" href="../clienteCSS/checkout.css">
</head>

<body>

    <header>

        <a href="catalogo.html" class="voltar">
            ← Voltar ao Catálogo
        </a>

    </header>

    <main class="checkout-container">

        <section class="dados-cliente">

            <h1>FINALIZAR PEDIDO</h1>

            <div class="grupo">
                <label>Nome Completo</label>
                <input type="text" id="nome">
            </div>

            <div class="grupo">
                <label>E-mail</label>
                <input type="email" id="email">
            </div>

            <div class="grupo">
                <label>Telefone</label>
                <input type="text" id="telefone">
            </div>

            <div class="linha">

                <div class="grupo">
                    <label>Data Inicial</label>
                    <input type="date" id="dataInicio">
                </div>

                <div class="grupo">
                    <label>Data Final</label>
                    <input type="date" id="dataFim">
                </div>

            </div>

            <div class="tipo-entrega">

                <label>
                    <input
                        type="radio"
                        name="tipoEntrega"
                        value="retirada"
                        checked
                        onchange="alterarTipoEntrega()">

                    Retirada
                </label>

                <label>
                    <input
                        type="radio"
                        name="tipoEntrega"
                        value="entrega"
                        onchange="alterarTipoEntrega()">

                    Entrega
                </label>

            </div>

            <div id="endereco" class="endereco oculto">

                <div class="grupo">
                    <label>CEP</label>
                    <input type="text" id="cep">
                </div>

                <div class="grupo">
                    <label>Rua</label>
                    <input type="text" id="rua">
                </div>

                <div class="linha">

                    <div class="grupo">
                        <label>Número</label>
                        <input type="text" id="numero">
                    </div>

                    <div class="grupo">
                        <label>Bairro</label>
                        <input type="text" id="bairro">
                    </div>

                </div>

            </div>

        </section>

        <aside class="resumo">

            <h2>RESUMO DO PEDIDO</h2>

            <div id="itensResumo"></div>

            <div class="linha-resumo">

                <span>Subtotal</span>

                <span>
                    R$ <span id="subtotal">0,00</span>
                </span>

            </div>

            <div class="linha-resumo">

                <span>Frete</span>

                <span>
                    R$ <span id="frete">0,00</span>
                </span>

            </div>

            <div class="linha-resumo total">

                <span>Total</span>

                <span>
                    R$ <span id="total">0,00</span>
                </span>

            </div>

            <button onclick="finalizarPedido()">
                FINALIZAR PEDIDO
            </button>

        </aside>

    </main>

    <script src="../clienteJS/checkout.js"></script>

</body>

</html>
