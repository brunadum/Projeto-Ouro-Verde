<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Ouro Verde</title>

    <link rel="stylesheet" href="../clienteCSS/checkout.css">
</head>

<body>

    <header>
        <a href="catalogo.html" class="voltar">
            ← Voltar ao Catálogo
        </a>
    </header>

    <main class="checkout-container">

        <section class="dados-cliente">

            <h1>FINALIZAR PEDIDO</h1>

            <div class="grupo">
                <label>Nome Completo</label>
                <input type="text" id="nome">
            </div>

            <div class="grupo">
                <label>E-mail</label>
                <input type="email" id="email">
            </div>

            <div class="grupo">
                <label>Telefone</label>
                <input type="text" id="telefone">
            </div>

            <div class="linha">
                <div class="grupo">
                    <label>Data Inicial</label>
                    <input type="date" id="dataInicio">
                </div>

                <div class="grupo">
                    <label>Data Final</label>
                    <input type="date" id="dataFim">
                </div>
            </div>

        </section>

        <aside class="resumo">

            <h2>RESUMO DO PEDIDO</h2>

            <div id="itensResumo"></div>

            <div class="linha-resumo">
                <span>Subtotal</span>
                <span>
                    R$ <span id="subtotal">0,00</span>
                </span>
            </div>

            <div class="linha-resumo total">
                <span>Total</span>
                <span>
                    R$ <span id="total">0,00</span>
                </span>
            </div>

            <div class="forma-pagamento" style="margin-top: 20px; margin-bottom: 20px;">
                <h3>Forma de Pagamento</h3>
                <label style="display: block; margin-bottom: 10px; cursor: pointer;">
                    <input type="radio" name="metodoPagamento" value="pix" checked>
                    Pix (Pagamento Imediato)
                </label>
                <label style="display: block; cursor: pointer;">
                    <input type="radio" name="metodoPagamento" value="presencial">
                    Pessoalmente (Dinheiro/Cartão na Retirada)
                </label>
            </div>

            <button onclick="finalizarPedido()">
                FINALIZAR PEDIDO
            </button>

        </aside>

    </main>

    <script src="../clienteJS/checkout.js"></script>

</body>

</html>
